name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend code quality checks
  backend-lint:
    name: Backend Lint (Black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install black

      - name: Run black (check formatting)
        run: |
          cd backend
          black --check .

  backend-lint-ruff:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install ruff

      - name: Run ruff (linting)
        run: |
          cd backend
          ruff check . --select=E,F,W --output-format=json > ruff-report.json || true
          ruff check . --select=E,F,W

      - name: Upload ruff report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ruff-report
          path: backend/ruff-report.json

  backend-typecheck:
    name: Backend Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install mypy
          pip install -r requirements.txt

      - name: Run mypy (type checking)
        run: |
          cd backend
          mypy app --warn-return-any=true --strict-optional=true || true

      - name: Upload mypy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mypy-report
          path: |
            backend/.mypy_cache/
            backend/mypy-report.json

  backend-security:
    name: Backend Security (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install bandit

      - name: Run bandit (security linting)
        run: |
          cd backend
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -f screen --skip B101 || true

      - name: Check for high severity issues
        run: |
          cd backend
          # Bandit returns 1 if issues found, check if any high severity
          if [ -f bandit-report.json ]; then
            HIGH_COUNT=$(python -c "import json; data=json.load(open('bandit-report.json')); print(sum(1 for r in data.get('results', []) if r.get('issue_severity') == 'HIGH'))")
            if [ "$HIGH_COUNT" -gt 0 ]; then
              echo "Found $HIGH_COUNT high severity security issues"
              exit 1
            fi
          fi

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json

  # Frontend code quality checks
  frontend-lint:
    name: Frontend Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 25
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint -- --max-warnings 0 --format json > eslint-report.json || true
          npm run lint

      - name: Upload eslint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-report
          path: frontend/eslint-report.json

  frontend-typecheck:
    name: Frontend Type Check (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 25
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run TypeScript compiler
        run: |
          cd frontend
          npx tsc --noEmit

  frontend-security:
    name: Frontend Security (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 25
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run npm audit
        run: |
          cd frontend
          npm audit --production --audit-level=high || true

      - name: Check for high/critical vulnerabilities
        run: |
          cd frontend
          # npm audit returns non-zero if vulnerabilities found
          # Check if any high/critical exist
          AUDIT_OUTPUT=$(npm audit --production --json)
          HIGH_COUNT=$(echo "$AUDIT_OUTPUT" | python -c "import sys, json; data=json.load(sys.stdin); print(data.get('metadata', {}).get('vulnerabilities', {}).get('high', 0))")
          CRITICAL_COUNT=$(echo "$AUDIT_OUTPUT" | python -c "import sys, json; data=json.load(sys.stdin); print(data.get('metadata', {}).get('vulnerabilities', {}).get('critical', 0))")
          if [ "$HIGH_COUNT" -gt 0 ] || [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "Found $HIGH_COUNT high and $CRITICAL_COUNT critical vulnerabilities"
            exit 1
          fi

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.json

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Set up Node.js 25
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Check backend dependencies
        run: |
          cd backend
          pip install pip-outdated
          pip list --outdated

      - name: Check frontend dependencies
        run: |
          cd frontend
          npm outdated || true

      - name: Generate dependency report
        run: |
          echo "## Dependency Summary" > dependency-report.md
          echo "" >> dependency-report.md
          echo "### Backend Dependencies" >> dependency-report.md
          cd backend && pip list --outdated >> ../dependency-report.md 2>&1 || true
          echo "" >> dependency-report.md
          echo "### Frontend Dependencies" >> dependency-report.md
          cd ../frontend && npm outdated >> ../dependency-report.md 2>&1 || true

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-report
          path: dependency-report.md

  # Aggregate lint results and comment on PR
  lint-summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-lint-ruff, backend-typecheck, backend-security, frontend-lint, frontend-typecheck, frontend-security, dependency-check]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate lint summary
        run: |
          echo "## Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Backend Quality Checks" >> $GITHUB_STEP_SUMMARY
          echo "- Black formatting: ${{ needs.backend-lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Ruff linting: ${{ needs.backend-lint-ruff.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- mypy type check: ${{ needs.backend-typecheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Bandit security: ${{ needs.backend-security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend Quality Checks" >> $GITHUB_STEP_SUMMARY
          echo "- ESLint: ${{ needs.frontend-lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript: ${{ needs.frontend-typecheck.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- npm audit: ${{ needs.frontend-security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependencies: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'Backend Black': '${{ needs.backend-lint.result }}',
              'Backend Ruff': '${{ needs.backend-lint-ruff.result }}',
              'Backend mypy': '${{ needs.backend-typecheck.result }}',
              'Backend Bandit': '${{ needs.backend-security.result }}',
              'Frontend ESLint': '${{ needs.frontend-lint.result }}',
              'Frontend TypeScript': '${{ needs.frontend-typecheck.result }}',
              'Frontend npm audit': '${{ needs.frontend-security.result }}',
              'Dependencies': '${{ needs.dependency-check.result }}'
            };

            let body = '### Code Quality Results\n\n';
            let allPassed = true;

            for (const [check, status] of Object.entries(results)) {
              const icon = status === 'success' ? '✅' : '❌';
              body += `${icon} ${check}: ${status}\n`;
              if (status !== 'success') allPassed = false;
            }

            if (!allPassed) {
              body += '\n⚠️ Some quality checks failed. Please review the logs.';
            } else {
              body += '\n✨ All quality checks passed!';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Check overall status
        run: |
          if [ "${{ needs.backend-lint.result }}" != "success" ] || \
             [ "${{ needs.backend-lint-ruff.result }}" != "success" ] || \
             [ "${{ needs.backend-security.result }}" != "success" ] || \
             [ "${{ needs.frontend-lint.result }}" != "success" ] || \
             [ "${{ needs.frontend-typecheck.result }}" != "success" ] || \
             [ "${{ needs.frontend-security.result }}" != "success" ]; then
            echo "One or more quality checks failed"
            exit 1
          fi
