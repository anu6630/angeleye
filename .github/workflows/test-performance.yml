name: Performance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run performance tests nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  BASE_URL: http://localhost:8000
  NODE_VERSION: '25'
  PYTHON_VERSION: '3.9'

jobs:
  api-load-test:
    name: API Load Testing (k6)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: notebook_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7.4
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install k6  # Install k6 for load testing

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Set up environment
        working-directory: ./backend
        run: |
          cp .env.example .env
          echo "DATABASE_URL=postgresql://test:test@localhost:5432/notebook_test" >> .env
          echo "REDIS_URL=redis://localhost:6379/0" >> .env
          echo "ENV=test" >> .env

      - name: Run database migrations
        working-directory: ./backend
        run: |
          alembic upgrade head

      - name: Start backend server
        working-directory: ./backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > backend.pid
          sleep 5

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/health > /dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Run feed load test (smoke)
        working-directory: ./tests/performance
        run: |
          k6 run feed_load_test.js \
            --duration 30s \
            --vus 10 \
            --out json=feed-results.json

      - name: Run search load test (smoke)
        working-directory: ./tests/performance
        run: |
          k6 run search_load_test.js \
            --duration 20s \
            --vus 10 \
            --out json=search-results.json

      - name: Run compilation load test (smoke)
        working-directory: ./tests/performance
        run: |
          k6 run compilation_load_test.js \
            --duration 30s \
            --vus 5 \
            --out json=compilation-results.json

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-load-test-results
          path: |
            tests/performance/feed-results.json
            tests/performance/search-results.json
            tests/performance/compilation-results.json
          retention-days: 30

      - name: Stop backend server
        if: always()
        working-directory: ./backend
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi

  frontend-performance:
    name: Frontend Performance (Lighthouse CI)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start production server
        working-directory: ./frontend
        run: |
          npm run start &
          echo $! > frontend.pid
          sleep 10

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Frontend is ready"
              break
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done

      - name: Run Lighthouse CI
        working-directory: ./frontend
        run: |
          lhci autorun \
            --collect.url=http://localhost:3000/feed \
            --collect.url=http://localhost:3000/search \
            --collect.url=http://localhost:3000/editor \
            --collect.settings.chromeFlags="--no-sandbox" \
            --upload.target=temporary-public-storage

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: |
            frontend/.lighthouseci
          retention-days: 30

      - name: Stop frontend server
        if: always()
        working-directory: ./frontend
        run: |
          if [ -f frontend.pid ]; then
            kill $(cat frontend.pid) || true
          fi

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## Performance Test Results\n\n';

            try {
              const lhrPath = 'frontend/.lighthouseci/lhr-report.json';
              if (fs.existsSync(lhrPath)) {
                const lhr = JSON.parse(fs.readFileSync(lhrPath, 'utf8'));
                comment += '### Lighthouse Scores\n\n';
                comment += `- Performance: ${Math.round(lhr.categories.performance.score * 100)}%\n`;
                comment += `- Accessibility: ${Math.round(lhr.categories.accessibility.score * 100)}%\n`;
                comment += `- Best Practices: ${Math.round(lhr.categories['best-practices'].score * 100)}%\n`;
                comment += `- SEO: ${Math.round(lhr.categories.seo.score * 100)}%\n\n`;
              }
            } catch (e) {
              comment += 'Failed to parse Lighthouse results.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  performance-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: [api-load-test, frontend-performance]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate summary
        run: |
          echo "# Performance Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## API Load Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Feed endpoint: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Search endpoint: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Compilation endpoint: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Frontend Performance" >> $GITHUB_STEP_SUMMARY
          echo "- Lighthouse CI: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- All budgets met: ✅ Passed" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        run: |
          if [ "${{ needs.api-load-test.result }}" != "success" ] || [ "${{ needs.frontend-performance.result }}" != "success" ]; then
            echo "One or more performance tests failed"
            exit 1
          fi
