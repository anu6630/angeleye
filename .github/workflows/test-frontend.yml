name: Test Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Component tests
  frontend-component:
    name: Frontend Component Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 25
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run component tests with coverage
        run: |
          cd frontend
          npm run test:coverage -- --reporter=verbose

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend-component
          name: frontend-component-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-component-coverage-report
          path: frontend/coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-component-test-results
          path: |
            frontend/coverage/
            frontend/junit.xml
          retention-days: 7

  # Store tests
  frontend-store:
    name: Frontend Store Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 25
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run store tests
        run: |
          cd frontend
          npm run test -- stores --reporter=verbose

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-store-test-results
          path: frontend/junit.xml
          retention-days: 7

  # Note: UI mode is commented out - not for CI
  # To run UI mode locally: npm run test:ui

  # Aggregate test results
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [frontend-component, frontend-store]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Generate test summary
        run: |
          echo "## Frontend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Component tests: ${{ needs.frontend-component.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Store tests: ${{ needs.frontend-store.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Publish test results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            let body = '### Frontend Test Results\n\n';
            body += `- Component tests: ${{ needs.frontend-component.result }}\n`;
            body += `- Store tests: ${{ needs.frontend-store.result }}\n`;
            body += '\nCheck the "Test Frontend" workflow for details.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
